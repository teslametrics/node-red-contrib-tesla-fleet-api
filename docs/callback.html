<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Tesla Fleet API — OAuth callback</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         margin: 0; min-height: 100vh; display: grid; place-items: center;
         background: #0f1115; color: #e6e6e6; padding: 24px; }
  .card { width: 100%; max-width: 560px; background: #1a1d24; border: 1px solid #2a2f3a;
          border-radius: 14px; padding: 28px; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  p.sub { margin: 0 0 20px; color: #9aa3b2; font-size: 14px; }
  label { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: #9aa3b2; }
  .code { display: flex; gap: 8px; margin: 6px 0 18px; }
  .code input { flex: 1; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 14px; padding: 12px; border-radius: 10px; border: 1px solid #2a2f3a;
                background: #11141a; color: #e6e6e6; }
  button { padding: 12px 16px; border: 0; border-radius: 10px; background: #cc0000; color: #fff;
           font-weight: 600; cursor: pointer; white-space: nowrap; }
  button:active { transform: translateY(1px); }
  button.ok { background: #2e9e44; }
  .params { font-size: 13px; color: #9aa3b2; }
  .params div { display: flex; justify-content: space-between; gap: 12px; padding: 4px 0;
                border-top: 1px solid #20242d; }
  .params code { color: #cdd3dd; word-break: break-all; }
  .none { color: #c9974a; }
  .hint { margin-top: 16px; font-size: 13px; color: #9aa3b2; }
</style>
</head>
<body>
  <div class="card">
    <h1>Tesla Fleet API — authorization code</h1>
    <p class="sub">Copy the code below and paste it back into Node-RED.</p>
    <div id="content"></div>
    <p class="hint">This page only displays the one-time code from the URL. The code is
      useless without your client secret, which never leaves your machine.</p>
  </div>

<script>
  (function () {
    var params = new URLSearchParams(location.search);
    var code = params.get('code');
    var content = document.getElementById('content');

    if (!code) {
      content.innerHTML = '<p class="none">No <code>code</code> found in the URL.</p>' +
        '<p class="hint">Register this page as your Redirect URI in your Tesla app, then ' +
        'complete the login &mdash; you will be sent back here with the code.</p>';
      return;
    }

    var label = document.createElement('label');
    label.textContent = 'Authorization code';
    var row = document.createElement('div');
    row.className = 'code';
    var input = document.createElement('input');
    input.readOnly = true; input.value = code;
    var btn = document.createElement('button');
    btn.textContent = 'Copy';
    btn.onclick = function () {
      var done = function () {
        btn.textContent = 'Copied'; btn.classList.add('ok');
        setTimeout(function () { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1500);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(code).then(done, function () { input.select(); document.execCommand('copy'); done(); });
      } else { input.select(); document.execCommand('copy'); done(); }
    };
    row.appendChild(input); row.appendChild(btn);
    content.appendChild(label); content.appendChild(row);
    input.focus(); input.select();

    var rest = [];
    params.forEach(function (v, k) { if (k !== 'code') rest.push([k, v]); });
    if (rest.length) {
      var box = document.createElement('div');
      box.className = 'params';
      rest.forEach(function (pair) {
        var d = document.createElement('div');
        var key = document.createElement('span'); key.textContent = pair[0];
        var val = document.createElement('code'); val.textContent = pair[1];
        d.appendChild(key); d.appendChild(val);
        box.appendChild(d);
      });
      content.appendChild(box);
    }
  })();
</script>
</body>
</html>
